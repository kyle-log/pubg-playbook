        },
        {
          name: "비밀의방 14",
          type: "secret-room",
          x: 60.62,
          y: 78.33,
          sourceUrl: "https://w0njay.tistory.com/entry/%EB%B0%B0%ED%8B%80%EA%B7%B8%EB%9D%BC%EC%9A%B4%EB%93%9C-%ED%83%9C%EC%9D%B4%EA%B3%A0-%EB%B9%84%EB%B0%80%EC%9D%98-%EB%B0%A9-2025",
        },
        {
          name: "비밀의방 15",
          type: "secret-room",
          x: 77.59,
          y: 87.85,
          sourceUrl: "https://w0njay.tistory.com/entry/%EB%B0%B0%ED%8B%80%EA%B7%B8%EB%9D%BC%EC%9A%B4%EB%93%9C-%ED%83%9C%EC%9D%B4%EA%B3%A0-%EB%B9%84%EB%B0%80%EC%9D%98-%EB%B0%A9-2025",
        },
      ];
      let previewPin = null;

      let scale = 1;
      let x = 0;
      let y = 0;
      let isDragging = false;
      let didMove = false;
      let shouldPlacePin = false;
      let isMinimapDragging = false;
      let startX = 0;
      let startY = 0;
      let pointerDownX = 0;
      let pointerDownY = 0;

      function getCopyText(pin) {
        return JSON.stringify(
          {
            x: pin.x,
            y: pin.y,
          },
          null,
          2,
        );
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("is-visible");
        window.clearTimeout(showToast.timeoutId);
        showToast.timeoutId = window.setTimeout(() => {
          toast.classList.remove("is-visible");
        }, 1200);
      }

      function getPinFilter(pin) {
        return pin.status === "preview" ? "preview" : pin.type || "safe";
      }

      function syncLegendState() {
        legend.querySelectorAll(".legend__item").forEach((button) => {
          const isActive = visiblePinFilters[button.dataset.filter];
          button.classList.toggle("is-off", !isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });
      }

      function renderPins() {
        mapWrap.querySelectorAll(".pin").forEach((pin) => pin.remove());
        const fragment = document.createDocumentFragment();
        const visiblePins = (previewPin ? [...safePins, previewPin] : safePins).filter(
          (pin) => visiblePinFilters[getPinFilter(pin)],
        );

        visiblePins.forEach((pin) => {
          const pinElement = document.createElement("span");
          pinElement.className = "pin";
          pinElement.style.setProperty("--x", `${pin.x}%`);
          pinElement.style.setProperty("--y", `${pin.y}%`);
          pinElement.title = `${pin.name || "이름 없음"}\nx: ${pin.x}, y: ${pin.y}`;
          pinElement.dataset.status = pin.status || "saved";
          pinElement.dataset.type = pin.type || "safe";
          fragment.append(pinElement);
        });

        mapWrap.append(fragment);
      }

      legend.addEventListener("pointerdown", (event) => {
        event.stopPropagation();
      });

      legend.addEventListener("click", (event) => {
        const button = event.target.closest(".legend__item");
        if (!button) return;
        event.stopPropagation();

        const filter = button.dataset.filter;
        visiblePinFilters[filter] = !visiblePinFilters[filter];
        syncLegendState();
        renderPins();
      });

      async function setPreviewPin(clientX, clientY) {
        const rect = viewport.getBoundingClientRect();
        const mapX = (clientX - rect.left - x) / scale;
        const mapY = (clientY - rect.top - y) / scale;
        const percentX = Math.min(100, Math.max(0, (mapX / rect.width) * 100));
        const percentY = Math.min(100, Math.max(0, (mapY / rect.height) * 100));

        previewPin = {
          x: Number(percentX.toFixed(2)),
          y: Number(percentY.toFixed(2)),
          status: "preview",
        };
        renderPins();
        try {
          await navigator.clipboard.writeText(getCopyText(previewPin));
          showToast("좌표 복사됨");
        } catch {
          showToast("좌표 복사 실패");
        }
      }

      function clampPosition() {
        const size = viewport.clientWidth;
        const scaledSize = size * scale;

        if (scaledSize <= size) {
          x = (size - scaledSize) / 2;
          y = (size - scaledSize) / 2;
          return;
        }

        x = Math.min(0, Math.max(size - scaledSize, x));
        y = Math.min(0, Math.max(size - scaledSize, y));
      }

      function render() {
        clampPosition();
        mapWrap.style.setProperty("--pin-scale", 1 / scale);
        mapWrap.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
        renderMinimap();
        zoomButtons.forEach((button) => {
          const action = button.dataset.zoom;
          button.disabled =
            (action === "in" && scale >= 5) ||
            (action === "out" && scale <= 1) ||
            (action === "reset" && scale === 1);
        });
      }

      function zoomAt(nextScale, originX, originY) {
        const mapX = (originX - x) / scale;
        const mapY = (originY - y) / scale;

        scale = Number(Math.min(5, Math.max(1, nextScale)).toFixed(2));
        x = originX - mapX * scale;
        y = originY - mapY * scale;
        render();
      }

      function zoomFromCenter(delta) {
        const center = viewport.clientWidth / 2;
        zoomAt(scale + delta, center, center);
      }

      viewport.addEventListener("wheel", (event) => {
        event.preventDefault();
        const rect = viewport.getBoundingClientRect();
        const pointerX = event.clientX - rect.left;
        const pointerY = event.clientY - rect.top;
        zoomAt(scale + (event.deltaY < 0 ? 0.06 : -0.06), pointerX, pointerY);
      });

      zoomControls.addEventListener("pointerdown", (event) => {
        event.stopPropagation();
      });

      zoomControls.addEventListener("click", (event) => {
        const button = event.target.closest(".zoom-control");
        if (!button) return;
        event.stopPropagation();

        if (button.dataset.zoom === "in") {
          zoomFromCenter(0.3);
        } else if (button.dataset.zoom === "out") {
          zoomFromCenter(-0.3);
        } else {
          scale = 1;
          x = 0;
          y = 0;
          render();
        }
      });

      function renderMinimap() {
        const size = viewport.clientWidth;
        const viewSize = 100 / scale;
        const left = Math.min(100 - viewSize, Math.max(0, (-x / scale / size) * 100));
        const top = Math.min(100 - viewSize, Math.max(0, (-y / scale / size) * 100));

        minimapViewport.style.width = `${viewSize}%`;
        minimapViewport.style.height = `${viewSize}%`;
        minimapViewport.style.left = `${left}%`;
        minimapViewport.style.top = `${top}%`;
      }

      function moveMapToMinimapPoint(clientX, clientY) {
        const minimapRect = minimap.getBoundingClientRect();
        const size = viewport.clientWidth;
        const percentX = Math.min(1, Math.max(0, (clientX - minimapRect.left) / minimapRect.width));
        const percentY = Math.min(1, Math.max(0, (clientY - minimapRect.top) / minimapRect.height));

        x = size / 2 - percentX * size * scale;
        y = size / 2 - percentY * size * scale;
        render();
      }

      minimap.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        isMinimapDragging = true;
        minimap.setPointerCapture(event.pointerId);
        moveMapToMinimapPoint(event.clientX, event.clientY);
      });

      minimap.addEventListener("pointermove", (event) => {
        if (!isMinimapDragging) return;
        event.preventDefault();
        moveMapToMinimapPoint(event.clientX, event.clientY);
      });

      minimap.addEventListener("pointerup", (event) => {
        event.stopPropagation();
        isMinimapDragging = false;
      });

      minimap.addEventListener("pointercancel", () => {
        isMinimapDragging = false;
      });

      viewport.addEventListener("pointerdown", (event) => {
        isDragging = true;
        didMove = false;
        shouldPlacePin = event.altKey;
        viewport.setPointerCapture(event.pointerId);
        startX = event.clientX - x;
        startY = event.clientY - y;
        pointerDownX = event.clientX;
        pointerDownY = event.clientY;
      });

      viewport.addEventListener("pointermove", (event) => {
        if (!isDragging) return;
        const moveDistance = Math.hypot(event.clientX - pointerDownX, event.clientY - pointerDownY);
        didMove = didMove || moveDistance > 4;
        x = event.clientX - startX;
        y = event.clientY - startY;
        render();
      });

      viewport.addEventListener("pointerup", (event) => {
        isDragging = false;
        if (shouldPlacePin && !didMove) {
          setPreviewPin(event.clientX, event.clientY);
        }
        shouldPlacePin = false;
      });

      syncLegendState();
      renderPins();
      render();
    </script>
